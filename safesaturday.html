<!DOCTYPE html>
<html>
<head>
    <title>सुरक्षित शनिवार एवं बैगलेस डे साप्ताहिकी - Learn With P K PANKAJ</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .header-area {
            text-align: center;
            background-color: #0d47a1;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-area h1 { margin: 0; font-size: 28px; }
        .header-area p { margin: 5px 0 0 0; color: #fbc02d; font-weight: bold; }

        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .magazine-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            transition: transform 0.2s;
        }

        .magazine-card:hover { transform: translateY(-5px); }
        .magazine-card img { width: 100%; height: auto; border-bottom: 1px solid #eeeeee; }
        .card-content { padding: 15px; }
        .card-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .action-buttons { display: flex; justify-content: space-between; }
        
        .btn {
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            width: 45%;
        }

        .btn-view { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #0d47a1; }
        .btn-download { background-color: #0d47a1; color: white; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #0d47a1; text-decoration: none; font-weight: bold; }
        
        /* लोडिंग स्पिनर का स्टाइल */
        #loading { text-align: center; font-size: 18px; color: #0d47a1; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <div style="max-width: 1200px; margin: 0 auto;">
        <a href="index.html" class="back-btn">⬅ मुख्य होमपेज पर वापस जाएं</a>
    </div>

    <div class="header-area">
        <h1>सुरक्षित शनिवार एवं बैगलेस डे साप्ताहिकी</h1>
        <p>सुरक्षा, सृजन एवं समग्र विकास की ओर एक पहल</p>
    </div>

    <div id="loading">🔄 आपकी पत्रिकाएं लोड हो रही हैं, कृपया प्रतीक्षा करें...</div>

    <div class="magazine-grid" id="magazine-container"></div>

    <script>
        // आपकी गूगल शीट का डेटा खींचने के लिए सेटिंग्स
        const sheetId = '1vwAcgGpKSLMlhtKKq0GkeE8OIbjrRNc_SQ21dRUVqm4';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        // शीट से डेटा लोड करने का फंक्शन
        fetch(base)
            .then(res => res.text())
            .then(csvText => {
                // लोडिंग मैसेज को छुपाएं
                document.getElementById('loading').style.display = 'none';
                
                // CSV डेटा को लाइनों में तोड़ना
                const rows = csvText.split('\n').slice(1); // पहली हेडर लाइन को छोड़कर
                const container = document.getElementById('magazine-container');
                
                // डेटा को उल्टे क्रम (Newest First) में दिखाने के लिए लूप
                for (let i = rows.length - 1; i >= 0; i--) {
                    if (!rows[i]) continue;
                    
                    // कॉमा के आधार पर डेटा अलग करना
                    const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // गूगल शीट के कॉलम (0 = टाइमस्टैम्प, 1 = टाइटल, 2 = इमेज लिंक, 3 = पीडीएफ लिंक)
                    const title = columns[1] ? columns[1].replace(/"/g, "") : "सुरक्षित शनिवार";
                    let imgLink = columns[2] ? columns[2].replace(/"/g, "") : "banner.jpg";
                    const pdfLink = columns[3] ? columns[3].replace(/"/g, "") : "#";

                    // यदि कोई इमेज लिंक न हो तो डिफॉल्ट बैनर दिखेगा
                    if(imgLink.trim() === "") { imgLink = "banner.jpg"; }

                    // 🖼️ नया HTML कार्ड तैयार करना
                    const cardHtml = `
                        <div class="magazine-card">
                            <img src="${imgLink}" alt="${title}">
                            <div class="card-content">
                                <div class="card-title">${title}</div>
                                <div class="action-buttons">
                                    <a href="${pdfLink}" target="_blank" class="btn btn-view">👁️ View</a>
                                    <a href="${pdfLink}" target="_blank" class="btn btn-download">📥 Download</a>
                                </div>
                            </div>
                        </div>
                    `;
                    // ग्रिड में कार्ड को जोड़ना
                    container.innerHTML += cardHtml;
                }
            })
            .catch(err => {
                document.getElementById('loading').innerText = "⚠️ डेटा लोड करने में त्रुटि हुई। कृपया दोबारा प्रयास करें।";
                console.error(err);
            });
    </script>

</body>
</html>
